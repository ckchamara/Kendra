<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sri Lankan Astrology Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --border-color: #94A3B8;
    --hover-bg: #EFF6FF;
    --active-bg: #DBEAFE;
    --primary: #3B82F6;
    --primary-hover: #2563EB;
    --bg-color: #F1F5F9;
    --card-bg: #FFFFFF;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --text-main: #0F172A;
    --text-muted: #64748B;
    --radius: 14px;
    --green: #10B981;
    --purple: #8B5CF6;
    --red: #EF4444;
    --header-bg: #FFFFFF;
    --header-border: #E2E8F0;
    --input-bg: #F1F5F9;
    --popover-bg: #FFFFFF;
  }

  [data-theme="dark"] {
    --border-color: #334155;
    --hover-bg: #1E293B;
    --active-bg: #1E3A5F;
    --primary: #60A5FA;
    --primary-hover: #3B82F6;
    --bg-color: #0F172A;
    --card-bg: #1E293B;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --text-main: #F1F5F9;
    --text-muted: #94A3B8;
    --green: #34D399;
    --purple: #A78BFA;
    --red: #F87171;
    --header-bg: #1E293B;
    --header-border: #334155;
    --input-bg: #0F172A;
    --popover-bg: #1E293B;
  }
  
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: var(--bg-color);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
  }

  /* Page Header */
  .page-header {
    width: 100%;
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .page-header-center {
    text-align: center;
    flex: 1;
  }
  .page-header h1 {
    margin: 0;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.01em;
  }
  .page-header p {
    margin: 2px 0 0;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* Dark mode toggle button */
  .theme-toggle {
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { background: var(--hover-bg); }

  .page-content {
    width: 100%;
    max-width: 1120px;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .main-container {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    width: 100%;
  }

  .chart-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
    gap: 12px;
  }

  .chart-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    align-self: flex-start;
  }

  .chart-wrapper {
    padding: 12px;
    background: var(--card-bg);
    box-shadow: var(--card-shadow);
    border-radius: var(--radius);
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .chart {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--card-bg);
    border-top: 1.5px solid var(--border-color);
    border-left: 1.5px solid var(--border-color);
    border-radius: 4px;
    overflow: hidden;
  }

  .cell {
    border-right: 1.5px solid var(--border-color);
    border-bottom: 1.5px solid var(--border-color);
    position: relative;
  }

  .center-cell {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 5%;
  }

  .center-input {
    width: 100%;
    text-align: center;
    text-align-last: center;
    font-size: clamp(0.9rem, 3vmin, 1.2rem);
    font-weight: bold;
    border: none;
    background: transparent;
    outline: none;
    color: var(--text-main);
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
  }
  .center-input option,
  .center-input optgroup {
    background: var(--card-bg);
    color: var(--text-main);
  }
  
  .center-input:focus { color: var(--text-main); }

  /* Compartment styling for hitboxes */
  .compartment {
    position: absolute;
    cursor: pointer;
    transition: background 0.2s ease;
    user-select: none;
  }

  .compartment:hover { background: var(--hover-bg); }
  .compartment.active { background: var(--active-bg); }

  .full-comp, .tri-comp {
    width: 100%;
    height: 100%;
    top: 0; left: 0;
  }
  
  /* CSS Clip Paths to split hit areas diagonally */
  .tl-top { clip-path: polygon(0 0, 100% 0, 100% 100%); }
  .tl-bot { clip-path: polygon(0 0, 100% 100%, 0 100%); }
  
  .tr-top { clip-path: polygon(0 0, 100% 0, 0 100%); }
  .tr-bot { clip-path: polygon(100% 0, 100% 100%, 0 100%); }

  .br-top { clip-path: polygon(0 0, 100% 0, 100% 100%); }
  .br-bot { clip-path: polygon(0 0, 100% 100%, 0 100%); }

  .bl-top { clip-path: polygon(0 0, 100% 0, 0 100%); }
  .bl-bot { clip-path: polygon(100% 0, 100% 100%, 0 100%); }

  /* Visual diagonal line using inline SVG */
  .bg-line {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  .bg-line line {
    stroke: var(--border-color);
    stroke-width: 1;
  }

  /* Text layout */
  .comp-text {
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: 600;
    color: var(--text-main);
    font-size: clamp(0.85rem, 2.5vmin, 1.1rem);
    pointer-events: none;
    z-index: 1;
    padding: 3%;
    box-sizing: border-box;
    word-break: break-word;
    line-height: 1.4;
  }

  .full-comp .comp-text {
    width: 100%; height: 100%;
    top: 0; left: 0;
  }

  .tri-comp .comp-text { width: 50%; height: 50%; }

  .tl-top .comp-text, .br-top .comp-text { top: 0; right: 0; }
  .tl-bot .comp-text, .br-bot .comp-text { bottom: 0; left: 0; }
  .tr-top .comp-text, .bl-top .comp-text { top: 0; left: 0; }
  .tr-bot .comp-text, .bl-bot .comp-text { bottom: 0; right: 0; }

  /* Floating Popover */
  .popover {
    position: absolute;
    background: var(--popover-bg);
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
    padding: 14px;
    border-radius: 12px;
    z-index: 1000;
    width: max-content;
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    visibility: hidden;
  }
  
  .popover.active {
    display: grid;
    animation: popIn 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.93) translateY(-6px); }
    to   { opacity: 1; transform: scale(1)    translateY(0);    }
  }

  .popover label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-main);
    padding: 5px 8px;
    border-radius: 6px;
    transition: background 0.12s;
    font-weight: 500;
  }
  .popover label:hover { background: var(--hover-bg); }
  .popover input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

  /* Buttons */
  .btn-group {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .action-btn {
    padding: 10px 18px;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    background: var(--primary);
  }
  .action-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
  .action-btn:active { opacity: 1;    transform: translateY(0);    }

  .save-btn  { background: var(--green);  }
  .ai-btn    { background: var(--purple); }
  .reset-btn { background: var(--red);    }

  .global-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }
  .global-actions .action-btn {
    flex: 1;
    max-width: 260px;
    padding: 14px;
    font-size: 0.95rem;
  }

  /* Cards (shared) */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 20px;
    width: 100%;
  }
  .card-title {
    margin: 0 0 14px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Birth Details */
  .input-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 140px;
  }
  .input-group label {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .input-group input {
    padding: 10px 12px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.92rem;
    color: var(--text-main);
    transition: border-color 0.15s, background 0.15s;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  /* Saved Charts */
  .saved-actions {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .saved-actions select {
    flex: 2;
    padding: 10px 12px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.92rem;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.15s;
  }
  .saved-actions select:focus { border-color: var(--primary); }
  .saved-actions .action-btn {
    flex: 1;
    padding: 10px 12px;
    font-size: 0.85rem;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-content {
    background: #fff;
    width: 92%;
    max-width: 580px;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateY(-16px);
    transition: transform 0.2s;
  }
  .modal-overlay.active .modal-content { transform: translateY(0); }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-main);
  }
  .close-modal {
    background: var(--bg-color);
    border: none;
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .close-modal:hover { background: #E2E8F0; color: var(--text-main); }
  
  #exportTextarea {
    width: 100%;
    height: 320px;
    padding: 14px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    resize: vertical;
    white-space: pre;
    overflow-x: auto;
    background: var(--input-bg);
    color: var(--text-main);
    line-height: 1.6;
  }
  #exportTextarea:focus { outline: none; border-color: var(--primary); }
  
  .modal-actions { display: flex; justify-content: flex-end; }
  .modal-actions .action-btn { flex: none; min-width: 140px; }

  /* Smooth dark mode transitions */
  body, .page-header, .card, .chart-wrapper, .modal-content,
  .input-group input, .saved-actions select, #exportTextarea,
  .popover, .action-btn { transition: background 0.25s, color 0.25s, border-color 0.25s; }

  /* Responsive */
  @media (max-width: 768px) {
    .page-content { padding: 12px; gap: 14px; }
    .main-container { gap: 14px; }
    .chart-wrapper { padding: 8px; }
    .card { padding: 14px; }

    .input-row { flex-direction: column; gap: 10px; }
    .input-group { min-width: 100%; }

    .comp-text { font-size: clamp(0.62rem, 3.2vw, 0.9rem); }
    .center-input { font-size: clamp(0.7rem, 3.8vw, 1rem); }

    .global-actions {
      flex-direction: column;
      gap: 8px;
    }
    .global-actions .action-btn {
      max-width: none;
      width: 100%;
    }

    .saved-actions { flex-direction: column; gap: 8px; }
    .saved-actions .action-btn { flex: none; }

    .popover {
      grid-template-columns: repeat(3, 1fr);
      padding: 10px;
      gap: 5px;
    }
    .popover label { font-size: 0.9rem; padding: 4px 5px; }

    .modal-content { padding: 16px; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div style="width:38px;"></div>
  <div class="page-header-center">
    <h1>ජාතක ලේඛනය</h1>
    <p>Sri Lankan Astrology Chart</p>
  </div>
  <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">☀️</button>
</header>

<div class="page-content">

<div class="main-container">
  
  <div class="card" style="width:100%;">
    <p class="card-title">Birth Details</p>
    <div class="input-row">
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="birthName" placeholder="e.g. Chamara">
      </div>
      <div class="input-group">
        <label>Date of Birth</label>
        <input type="text" id="birthDate" placeholder="e.g. 1990-01-01">
      </div>
      <div class="input-group">
        <label>Time of Birth</label>
        <input type="text" id="birthTime" placeholder="e.g. 10:30 AM">
      </div>
      <div class="input-group">
        <label>Place of Birth</label>
        <input type="text" id="birthPlace" placeholder="e.g. Colombo, Sri Lanka">
      </div>
    </div>
  </div>

  <!-- RASI CHART -->
  <div class="chart-section" id="rasi-section">
    <span class="chart-label">ලග්න කේන්ද්‍රය · Rasi Chart</span>
    <div class="chart-wrapper">
      <div class="chart" id="rasi-chart">
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp tl-top" id="rasi-1"><div class="comp-text"></div></div>
          <div class="compartment tri-comp tl-bot" id="rasi-12"><div class="comp-text"></div></div>
        </div>
        <div class="cell"><div class="compartment full-comp" id="rasi-2"><div class="comp-text"></div></div></div>
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="100" y1="0" x2="0" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp tr-top" id="rasi-3"><div class="comp-text"></div></div>
          <div class="compartment tri-comp tr-bot" id="rasi-4"><div class="comp-text"></div></div>
        </div>
        <div class="cell"><div class="compartment full-comp" id="rasi-11"><div class="comp-text"></div></div></div>
        <div class="cell center-cell">
          <select class="center-input title-select">
            <option value="" disabled>ලග්නය / නවාංශකය</option>
            <optgroup label="ලග්නය">
              <option value="1" selected>මේෂ ලග්නය</option>
              <option value="2">වෘෂභ ලග්නය</option>
              <option value="3">මිථුන ලග්නය</option>
              <option value="4">කටක ලග්නය</option>
              <option value="5">සිංහ ලග්නය</option>
              <option value="6">කන්‍යා ලග්නය</option>
              <option value="7">තුලා ලග්නය</option>
              <option value="8">වෘශ්චික ලග්නය</option>
              <option value="9">ධනු ලග්නය</option>
              <option value="10">මකර ලග්නය</option>
              <option value="11">කුම්භ ලග්නය</option>
              <option value="12">මීන ලග්නය</option>
            </optgroup>
          </select>
        </div>
        <div class="cell"><div class="compartment full-comp" id="rasi-5"><div class="comp-text"></div></div></div>
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="100" y1="0" x2="0" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp bl-top" id="rasi-10"><div class="comp-text"></div></div>
          <div class="compartment tri-comp bl-bot" id="rasi-9"><div class="comp-text"></div></div>
        </div>
        <div class="cell"><div class="compartment full-comp" id="rasi-8"><div class="comp-text"></div></div></div>
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp br-top" id="rasi-6"><div class="comp-text"></div></div>
          <div class="compartment tri-comp br-bot" id="rasi-7"><div class="comp-text"></div></div>
        </div>
      </div>
    </div>
    <div class="btn-group">
      <button class="action-btn" onclick="openExportModal('rasi', 'ascii')" style="flex:1">ASCII</button>
    </div>
  </div>

  <!-- NAVAMSA CHART -->
  <div class="chart-section" id="navamsa-section">
    <span class="chart-label">නවාංශ කේන්ද්‍රය · Navamsa Chart</span>
    <div class="chart-wrapper">
      <div class="chart" id="navamsa-chart">
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp tl-top" id="navamsa-1"><div class="comp-text"></div></div>
          <div class="compartment tri-comp tl-bot" id="navamsa-12"><div class="comp-text"></div></div>
        </div>
        <div class="cell"><div class="compartment full-comp" id="navamsa-2"><div class="comp-text"></div></div></div>
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="100" y1="0" x2="0" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp tr-top" id="navamsa-3"><div class="comp-text"></div></div>
          <div class="compartment tri-comp tr-bot" id="navamsa-4"><div class="comp-text"></div></div>
        </div>
        <div class="cell"><div class="compartment full-comp" id="navamsa-11"><div class="comp-text"></div></div></div>
        <div class="cell center-cell">
          <select class="center-input title-select">
            <option value="" disabled>ලග්නය / නවාංශකය</option>
            <optgroup label="නවාංශකය">
              <option value="1" selected>මේෂ නවාංශකය</option>
              <option value="2">වෘෂභ නවාංශකය</option>
              <option value="3">මිථුන නවාංශකය</option>
              <option value="4">කටක නවාංශකය</option>
              <option value="5">සිංහ නවාංශකය</option>
              <option value="6">කන්‍යා නවාංශකය</option>
              <option value="7">තුලා නවාංශකය</option>
              <option value="8">වෘශ්චික නවාංශකය</option>
              <option value="9">ධනු නවාංශකය</option>
              <option value="10">මකර නවාංශකය</option>
              <option value="11">කුම්භ නවාංශකය</option>
              <option value="12">මීන නවාංශකය</option>
            </optgroup>
          </select>
        </div>
        <div class="cell"><div class="compartment full-comp" id="navamsa-5"><div class="comp-text"></div></div></div>
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="100" y1="0" x2="0" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp bl-top" id="navamsa-10"><div class="comp-text"></div></div>
          <div class="compartment tri-comp bl-bot" id="navamsa-9"><div class="comp-text"></div></div>
        </div>
        <div class="cell"><div class="compartment full-comp" id="navamsa-8"><div class="comp-text"></div></div></div>
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp br-top" id="navamsa-6"><div class="comp-text"></div></div>
          <div class="compartment tri-comp br-bot" id="navamsa-7"><div class="comp-text"></div></div>
        </div>
      </div>
    </div>
    <div class="btn-group">
      <button class="action-btn" onclick="openExportModal('navamsa', 'ascii')" style="flex:1">ASCII</button>
    </div>
  </div>

</div>

<!-- Saved Charts Section -->
<div class="card" style="max-width:1040px;">
  <p class="card-title">Saved Charts</p>
  <div class="saved-actions">
    <select id="savedChartsDropdown">
      <option value="" disabled selected>Select a saved chart...</option>
    </select>
    <button class="action-btn" onclick="loadChart()">Load</button>
    <button class="action-btn reset-btn" onclick="deleteChart()">Delete</button>
  </div>
</div>

<!-- Global Actions -->
<div class="global-actions">
  <button class="action-btn save-btn" onclick="saveChart()">Save Chart</button>
  <button class="action-btn ai-btn" onclick="openExportModal('both', 'ai')">Export Both Charts for AI</button>
  <button class="action-btn reset-btn" onclick="resetAll()">Reset All</button>
</div>

</div>

<!-- Dynamic Popover -->
<div class="popover" id="popover"></div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal" onclick="handleModalClick(event)">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Export Chart</h3>
      <button class="close-modal" onclick="closeModal()">×</button>
    </div>
    <textarea id="exportTextarea" readonly></textarea>
    <div class="modal-actions">
      <button class="action-btn copy-btn" id="modalCopyBtn" onclick="copyFromTextarea()">Copy to Clipboard</button>
    </div>
  </div>
</div>

<script>
  // ── Dark Mode ──────────────────────────────────────────────────────────────
  const html = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');

  function applyTheme(dark) {
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    toggleBtn.textContent = dark ? '🌙' : '☀️';
  }

  function toggleTheme() {
    const isDark = html.getAttribute('data-theme') === 'dark';
    const next = !isDark;
    localStorage.setItem('kendra-theme', next ? 'dark' : 'light');
    applyTheme(next);
  }

  toggleBtn.addEventListener('click', toggleTheme);

  // Initialise from saved preference or system setting
  const saved = localStorage.getItem('kendra-theme');
  if (saved) {
    applyTheme(saved === 'dark');
  } else {
    applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
  }
  // ──────────────────────────────────────────────────────────────────────────

  const planets = [
    'ර', 'ච', 'කු', 'බු', 'ගු', 'ශු', 'ශ', 'රා', 'කේ', 'ල',
    '(කු)', '(බු)', '(ගු)', '(ශු)', '(ශ)',
    'යු', 'නෙ', 'ප්ලූ', '(යු)', '(නෙ)', '(ප්ලූ)'
  ];
  const signNames = {
    1: 'මේෂ (Aries)', 2: 'වෘෂභ (Taurus)', 3: 'මිථුන (Gemini)', 4: 'කටක (Cancer)',
    5: 'සිංහ (Leo)', 6: 'කන්‍යා (Virgo)', 7: 'තුලා (Libra)', 8: 'වෘශ්චික (Scorpio)',
    9: 'ධනු (Sagittarius)', 10: 'මකර (Capricorn)', 11: 'කුම්භ (Aquarius)', 12: 'මීන (Pisces)'
  };
  
  const popover = document.getElementById('popover');
  const state = {}; 
  let activeCompartment = null;

  planets.forEach(p => {
    const label = document.createElement('label');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.value = p;
    
    checkbox.addEventListener('change', (e) => {
      if (!activeCompartment) return;
      const compId = activeCompartment.id;
      if (!state[compId]) state[compId] = [];
      
      if (e.target.checked) {
        state[compId].push(p);
      } else {
        state[compId] = state[compId].filter(val => val !== p);
      }
      updateCompartmentText(activeCompartment);
    });

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(p));
    popover.appendChild(label);
  });

  function updateCompartmentText(comp) {
    const textDiv = comp.querySelector('.comp-text');
    const selected = state[comp.id] || [];
    const orderedSelected = planets.filter(p => selected.includes(p));
    textDiv.textContent = orderedSelected.join(',');
  }

  function closePopover() {
    popover.classList.remove('active');
    popover.style.visibility = 'hidden';
    if (activeCompartment) {
      activeCompartment.classList.remove('active');
      activeCompartment = null;
    }
  }

  document.querySelectorAll('.compartment').forEach(comp => {
    comp.addEventListener('click', (e) => {
      e.stopPropagation();
      if (activeCompartment === comp) { closePopover(); return; }
      if (activeCompartment) { activeCompartment.classList.remove('active'); }

      activeCompartment = comp;
      activeCompartment.classList.add('active');

      const selected = state[comp.id] || [];
      popover.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.checked = selected.includes(cb.value);
      });

      popover.style.visibility = 'hidden';
      popover.classList.add('active');
      
      const popRect = popover.getBoundingClientRect();
      const offset = 18; 
      
      let leftPos = e.pageX + offset;
      let topPos = e.pageY + offset;

      if (leftPos + popRect.width > window.innerWidth) { leftPos = e.pageX - popRect.width - offset; }
      if (topPos + popRect.height > window.innerHeight) { topPos = e.pageY - popRect.height - offset; }
      
      leftPos = Math.max(15, leftPos);
      topPos = Math.max(15, topPos);

      popover.style.left = `${leftPos}px`;
      popover.style.top = `${topPos}px`;
      popover.style.visibility = 'visible';
    });
  });

  document.addEventListener('click', (e) => {
    if (activeCompartment && !popover.contains(e.target)) {
      closePopover();
    }
  });
  window.addEventListener('resize', closePopover);

  // Auto-format Birth Date (YYYY-MM-DD)
  document.getElementById('birthDate').addEventListener('input', function(e) {
    if (e.inputType === 'deleteContentBackward') return;
    let digits = e.target.value.replace(/\D/g, '').substring(0, 8);
    let out = '';
    
    if (digits.length >= 4) {
      out = digits.substring(0, 4) + '-';
      if (digits.length >= 6) {
        out += digits.substring(4, 6) + '-' + digits.substring(6);
      } else {
        out += digits.substring(4);
      }
    } else {
      out = digits;
    }
    
    e.target.value = out;
  });

  // Auto-format Birth Time (HH:MM AM/PM)
  document.getElementById('birthTime').addEventListener('input', function(e) {
    if (e.inputType === 'deleteContentBackward') return;
    let v = e.target.value;
    let digits = v.replace(/\D/g, '').substring(0, 4);
    
    // Auto-pad hours if user types 2-9 as first digit
    if (digits.length === 1 && parseInt(digits[0]) > 1) {
      digits = '0' + digits;
    }
    
    let out = '';
    if (digits.length >= 2) {
      out = digits.substring(0, 2) + ':';
      if (digits.length > 2) {
        out += digits.substring(2);
      }
    } else {
      out = digits;
    }
    
    if (digits.length === 4) {
      let letters = v.replace(/[^AaPp]/g, '').toUpperCase();
      if (letters.includes('A')) out += ' AM';
      else if (letters.includes('P')) out += ' PM';
      else if (!out.endsWith(' ')) out += ' ';
    }
    
    e.target.value = out;
  });

  // Reset Logic
  function resetChart(type) {
    for(let i=1; i<=12; i++) {
      state[`${type}-${i}`] = [];
      const textDiv = document.querySelector(`#${type}-${i} .comp-text`);
      if(textDiv) textDiv.textContent = '';
    }
    const select = document.querySelector(`#${type}-chart .title-select`);
    if (select) select.value = "1";
    
    if (activeCompartment && activeCompartment.id.startsWith(type)) {
      closePopover();
    }
  }

  function resetAll() {
    resetChart('rasi');
    resetChart('navamsa');
    document.getElementById('birthName').value = '';
    document.getElementById('birthDate').value = '';
    document.getElementById('birthTime').value = '';
    document.getElementById('birthPlace').value = '';
  }

  // API Integration for Save/Load
  const API_URL = '/api/charts';

  async function fetchSavedCharts() {
    try {
      const res = await fetch(API_URL);
      const charts = await res.json();
      const dropdown = document.getElementById('savedChartsDropdown');
      dropdown.innerHTML = '<option value="" disabled selected>Select a saved chart...</option>';
      charts.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.id;
        dropdown.appendChild(opt);
      });
      window.savedChartsData = charts;
    } catch (err) {
      console.error('Failed to fetch charts', err);
    }
  }

  // Fetch charts when page loads
  fetchSavedCharts();

  async function saveChart() {
    const name = document.getElementById('birthName').value.trim();
    const date = document.getElementById('birthDate').value.trim();
    if (!name || !date) {
      alert("Please enter both Name and Date of Birth to save a chart.");
      return;
    }

    const year = date.split('-')[0] || date;
    const id = `${year} - ${name}`;

    const rasiSelect = document.querySelector('#rasi-chart .title-select');
    const navamsaSelect = document.querySelector('#navamsa-chart .title-select');

    const chartData = {
      id,
      name,
      date,
      time: document.getElementById('birthTime').value,
      place: document.getElementById('birthPlace').value,
      rasiLagna: rasiSelect ? rasiSelect.value : "1",
      navamsaLagna: navamsaSelect ? navamsaSelect.value : "1",
      state: state
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(chartData)
      });
      if (res.ok) {
        alert(`Chart for "${id}" saved successfully!`);
        fetchSavedCharts();
      } else {
        alert("Failed to save chart.");
      }
    } catch (err) {
      alert("Error saving chart. Is the server running?");
      console.error(err);
    }
  }

  function loadChart() {
    const dropdown = document.getElementById('savedChartsDropdown');
    const id = dropdown.value;
    if (!id || !window.savedChartsData) return;

    const chartData = window.savedChartsData.find(c => c.id === id);
    if (!chartData) return;

    resetAll();

    document.getElementById('birthName').value = chartData.name || '';
    document.getElementById('birthDate').value = chartData.date || '';
    document.getElementById('birthTime').value = chartData.time || '';
    document.getElementById('birthPlace').value = chartData.place || '';

    const rasiSelect = document.querySelector('#rasi-chart .title-select');
    if (rasiSelect && chartData.rasiLagna) rasiSelect.value = chartData.rasiLagna;
    
    const navamsaSelect = document.querySelector('#navamsa-chart .title-select');
    if (navamsaSelect && chartData.navamsaLagna) navamsaSelect.value = chartData.navamsaLagna;

    if (chartData.state) {
      Object.keys(chartData.state).forEach(key => {
        state[key] = chartData.state[key];
        const comp = document.getElementById(key);
        if (comp) updateCompartmentText(comp);
      });
    }
  }

  async function deleteChart() {
    const dropdown = document.getElementById('savedChartsDropdown');
    const id = dropdown.value;
    if (!id) return;

    if (!confirm(`Are you sure you want to delete the chart for "${id}"?`)) return;

    try {
      const res = await fetch(`${API_URL}/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (res.ok) {
        alert('Chart deleted.');
        fetchSavedCharts();
      }
    } catch (err) {
      alert("Error deleting chart.");
      console.error(err);
    }
  }

  // Export Logic
  function padStr(str, len = 12) {
    if (!str) return ' '.repeat(len);
    let diff = len - str.length;
    if (diff <= 0) return str.substring(0, len);
    let left = Math.floor(diff / 2);
    let right = diff - left;
    return ' '.repeat(left) + str + ' '.repeat(right);
  }

  function generateAscii(type) {
    const s = {};
    for(let i = 1; i <= 12; i++) {
      const val = state[`${type}-${i}`];
      s[i] = val && val.length > 0 ? val.join(',') : '';
    }
    const titleSelect = document.querySelector(`#${type}-chart .title-select`);
    let titleText = 'Unknown';
    if (titleSelect && titleSelect.options.length > 0) {
      titleText = titleSelect.options[titleSelect.selectedIndex].text;
    }
    const t = padStr(titleText, 26);

    return `+------------+------------+------------+------------+
|            |            |            |            |
|${padStr(s[12])}|${padStr(s[1])}|${padStr(s[2])}|${padStr(s[3])}|
|            |            |            |            |
+------------+------------+------------+------------+
|            |                         |            |
|${padStr(s[11])}|                         |${padStr(s[4])}|
|            |                         |            |
+------------+${t}+------------+
|            |                         |            |
|${padStr(s[10])}|                         |${padStr(s[5])}|
|            |                         |            |
+------------+------------+------------+------------+
|            |            |            |            |
|${padStr(s[9])}|${padStr(s[8])}|${padStr(s[7])}|${padStr(s[6])}|
|            |            |            |            |
+------------+------------+------------+------------+`;
  }

  function getOrdinal(n) {
    const s = ["th", "st", "nd", "rd"];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function getChartPromptData(type) {
    const titleSelect = document.querySelector(`#${type}-chart .title-select`);
    let lagnaIdx = 1;
    let titleText = 'Unknown';
    if (titleSelect && titleSelect.options.length > 0) {
      lagnaIdx = parseInt(titleSelect.value) || 1;
      titleText = titleSelect.options[titleSelect.selectedIndex].text;
    }

    let data = `**Ascendant (Lagna):** ${titleText}\n\n`;
    data += `**Planetary Positions by House (Bhava):**\n`;
    
    for(let h = 1; h <= 12; h++) {
      let signIdx = ((lagnaIdx + h - 2) % 12) + 1;
      const val = state[`${type}-${signIdx}`];
      const planetsStr = val && val.length > 0 ? val.join(', ') : '[Empty]';
      data += `- ${getOrdinal(h)} House (${signNames[signIdx]}): ${planetsStr}\n`;
    }
    return data;
  }

  function isChartEmpty(type) {
    for (let i = 1; i <= 12; i++) {
      if (state[`${type}-${i}`] && state[`${type}-${i}`].length > 0) {
        return false;
      }
    }
    return true;
  }

  function generateAIPrompt(type) {
    const bDate = document.getElementById('birthDate').value;
    const bTime = document.getElementById('birthTime').value;
    const bPlace = document.getElementById('birthPlace').value;
    
    let header = ``;
    if (bDate || bTime || bPlace) {
      header += `**Birth Details:**\n`;
      if (bDate) header += `- Date: ${bDate}\n`;
      if (bTime) header += `- Time: ${bTime}\n`;
      if (bPlace) header += `- Place: ${bPlace}\n`;
      header += `\n`;
    }

    if (type === 'both') {
      let prompt = header + `### 1. Rasi Chart (D1)\n` + getChartPromptData('rasi') + `\n\n`;
      if (!isChartEmpty('navamsa')) {
        prompt += `### 2. Navamsa Chart (D9)\n` + getChartPromptData('navamsa');
      } else {
        prompt += `*(Navamsa Chart not provided)*\n`;
      }
      return prompt;
    } else {
      const chartName = type === 'rasi' ? 'Rasi (D1)' : 'Navamsa (D9)';
      return header + `**Chart Type:** ${chartName}\n` + getChartPromptData(type);
    }
  }

  function openExportModal(type, format) {
    const modal = document.getElementById('exportModal');
    const textarea = document.getElementById('exportTextarea');
    const title = document.getElementById('modalTitle');
    
    if (format === 'ascii') {
      title.textContent = `ASCII Grid - ${type === 'rasi' ? 'Rasi' : 'Navamsa'}`;
      textarea.value = generateAscii(type);
    } else {
      if (type === 'both') {
        title.textContent = `AI Prompt - Rasi & Navamsa`;
      } else {
        title.textContent = `AI Prompt - ${type === 'rasi' ? 'Rasi' : 'Navamsa'}`;
      }
      textarea.value = generateAIPrompt(type);
    }
    
    modal.classList.add('active');
  }

  function closeModal() {
    document.getElementById('exportModal').classList.remove('active');
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = 'Copy to Clipboard';
    btn.style.background = '#222';
  }

  function handleModalClick(e) {
    if (e.target.id === 'exportModal') {
      closeModal();
    }
  }

  function copyFromTextarea() {
    const textarea = document.getElementById('exportTextarea');
    textarea.select();
    textarea.setSelectionRange(0, 99999);
    
    function onSuccess() {
      const btn = document.getElementById('modalCopyBtn');
      btn.textContent = 'Copied!';
      btn.style.background = '#4CAF50';
    }

    function fallbackCopy() {
      try {
        const successful = document.execCommand('copy');
        if (successful) onSuccess();
        else alert('Could not copy automatically. Please long-press and copy manually.');
      } catch (err) {
        console.error('Fallback copy failed', err);
        alert('Could not copy automatically. Please long-press and copy manually.');
      }
    }

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(textarea.value).then(onSuccess).catch(err => {
        console.warn('Clipboard API failed, trying fallback...', err);
        fallbackCopy();
      });
    } else {
      fallbackCopy();
    }
  }
</script>
</body>
