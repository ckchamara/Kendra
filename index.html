<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sri Lankan Astrology Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --border-color: #94A3B8;
    --hover-bg: #EEF2FF;
    --active-bg: #E0E7FF;
    --primary: #4F46E5;
    --primary-hover: #4338CA;
    --bg-color: #F8FAFC;
    --card-bg: #FFFFFF;
    --card-shadow: 0 2px 8px rgba(0,0,0,0.04);
    --chart-shadow: 0 10px 30px rgba(0,0,0,0.08);
    --text-main: #0F172A;
    --text-muted: #64748B;
    --radius: 14px;
    --green: #10B981;
    --purple: #8B5CF6;
    --red: #EF4444;
    --header-bg: #FFFFFF;
    --header-border: #E2E8F0;
    --input-bg: #F8FAFC;
    --popover-bg: #FFFFFF;
  }

  [data-theme="dark"] {
    --border-color: #374151;
    --hover-bg: #1F2937;
    --active-bg: #374151;
    --primary: #6366F1;
    --primary-hover: #4F46E5;
    --bg-color: #0B0F19;
    --card-bg: #111827;
    --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
    --chart-shadow: 0 10px 30px rgba(0,0,0,0.4);
    --text-main: #F9FAFB;
    --text-muted: #9CA3AF;
    --green: #34D399;
    --purple: #A78BFA;
    --red: #F87171;
    --header-bg: #111827;
    --header-border: #374151;
    --input-bg: #1F2937;
    --popover-bg: #111827;
  }
  
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: var(--bg-color);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
  }

  /* Page Header */
  .page-header {
    width: 100%;
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .page-header-center {
    text-align: center;
    flex: 1;
  }
  .page-header h1 {
    margin: 0;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.01em;
  }
  .page-header p {
    margin: 2px 0 0;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* Dark mode toggle button */
  .theme-toggle {
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { background: var(--hover-bg); }

  .page-content {
    width: 100%;
    max-width: 1120px;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .main-container {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    width: 100%;
  }

  .chart-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
    gap: 12px;
  }

  .chart-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    align-self: flex-start;
  }

  .chart-wrapper {
    padding: 14px;
    background: var(--card-bg);
    box-shadow: var(--chart-shadow);
    border-radius: var(--radius);
    width: 100%;
    display: flex;
    justify-content: center;
    transition: box-shadow 0.25s, background 0.25s;
  }

  .chart {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--card-bg);
    border-top: 1.5px solid var(--border-color);
    border-left: 1.5px solid var(--border-color);
    border-radius: 4px;
    overflow: hidden;
  }

  .cell {
    border-right: 1.5px solid var(--border-color);
    border-bottom: 1.5px solid var(--border-color);
    position: relative;
  }

  .center-cell {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 5%;
  }

  .center-input {
    width: 100%;
    text-align: center;
    text-align-last: center;
    font-size: clamp(0.9rem, 3vmin, 1.2rem);
    font-weight: bold;
    border: none;
    background: transparent;
    outline: none;
    color: var(--text-main);
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
  }
  .center-input option,
  .center-input optgroup {
    background: var(--card-bg);
    color: var(--text-main);
  }
  
  .center-input:focus { color: var(--text-main); }

  /* Compartment styling for hitboxes */
  .compartment {
    position: absolute;
    cursor: pointer;
    transition: background 0.2s ease;
    user-select: none;
  }

  .compartment:hover { background: var(--hover-bg); }
  .compartment.active { background: var(--active-bg); }

  .full-comp, .tri-comp {
    width: 100%;
    height: 100%;
    top: 0; left: 0;
  }
  
  /* CSS Clip Paths to split hit areas diagonally */
  .tl-top { clip-path: polygon(0 0, 100% 0, 100% 100%); }
  .tl-bot { clip-path: polygon(0 0, 100% 100%, 0 100%); }
  
  .tr-top { clip-path: polygon(0 0, 100% 0, 0 100%); }
  .tr-bot { clip-path: polygon(100% 0, 100% 100%, 0 100%); }

  .br-top { clip-path: polygon(0 0, 100% 0, 100% 100%); }
  .br-bot { clip-path: polygon(0 0, 100% 100%, 0 100%); }

  .bl-top { clip-path: polygon(0 0, 100% 0, 0 100%); }
  .bl-bot { clip-path: polygon(100% 0, 100% 100%, 0 100%); }

  /* Visual diagonal line using inline SVG */
  .bg-line {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  .bg-line line {
    stroke: var(--border-color);
    stroke-width: 1;
  }

  /* Text layout */
  .comp-text {
    position: absolute;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    align-content: center;
    gap: 3px;
    text-align: center;
    pointer-events: none;
    z-index: 1;
    padding: 3%;
    box-sizing: border-box;
  }
  
  .planet-pill {
    background: var(--primary);
    color: #FFFFFF;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
    line-height: 1.2;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  [data-theme="dark"] .planet-pill {
    color: #FFFFFF;
  }

  .full-comp .comp-text {
    width: 100%; height: 100%;
    top: 0; left: 0;
  }

  .tri-comp .comp-text { width: 50%; height: 50%; }

  .tl-top .comp-text, .br-top .comp-text { top: 0; right: 0; }
  .tl-bot .comp-text, .br-bot .comp-text { bottom: 0; left: 0; }
  .tr-top .comp-text, .bl-top .comp-text { top: 0; left: 0; }
  .tr-bot .comp-text, .bl-bot .comp-text { bottom: 0; right: 0; }

  /* Floating Popover */
  .popover {
    position: absolute;
    background: var(--popover-bg);
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
    padding: 14px;
    border-radius: 12px;
    z-index: 1000;
    width: max-content;
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    visibility: hidden;
  }
  
  .popover.active {
    display: grid;
    animation: popIn 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.93) translateY(-6px); }
    to   { opacity: 1; transform: scale(1)    translateY(0);    }
  }

  .popover label {
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 0.95rem;
    color: var(--text-main);
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    transition: all 0.2s;
    font-weight: 600;
  }
  .popover label:hover { background: var(--hover-bg); }
  .popover label.active-chip {
    background: var(--primary);
    color: #FFFFFF;
    border-color: var(--primary);
  }
  .popover input[type="checkbox"] { display: none; }

  /* Buttons */
  .btn-group {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .action-btn {
    padding: 10px 18px;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    background: var(--primary);
  }
  .action-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
  .action-btn:active { opacity: 1;    transform: translateY(0);    }

  .save-btn  { background: var(--green);  }
  .ai-btn    { background: var(--purple); }
  .reset-btn { background: var(--red);    }

  .global-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }
  .global-actions .action-btn {
    flex: 1;
    max-width: 260px;
    padding: 14px;
    font-size: 0.95rem;
  }

  /* Cards (shared) */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 20px;
    width: 100%;
  }
  .card-title {
    margin: 0 0 14px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Birth Details */
  .input-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 140px;
  }
  .input-group label {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .input-group input, .input-group select {
    padding: 10px 12px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.92rem;
    color: var(--text-main);
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: var(--primary);
    background: var(--card-bg);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  /* Saved Charts */
  .saved-actions {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .saved-actions select {
    flex: 2;
    padding: 10px 12px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.92rem;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.15s;
  }
  .saved-actions select:focus { border-color: var(--primary); }
  .saved-actions .action-btn {
    flex: 1;
    padding: 10px 12px;
    font-size: 0.85rem;
  }
  .saved-actions .delete-btn {
    flex: 0 0 auto !important;
    padding: 6px 12px !important;
    font-size: 0.8rem !important;
    align-self: center;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-content {
    background: var(--card-bg);
    width: 92%;
    max-width: 580px;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateY(-16px);
    transition: transform 0.2s;
  }
  .modal-overlay.active .modal-content { transform: translateY(0); }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-main);
  }
  .close-modal {
    background: var(--bg-color);
    border: none;
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .close-modal:hover { background: #E2E8F0; color: var(--text-main); }
  
  #exportTextarea {
    width: 100%;
    height: 320px;
    padding: 14px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    resize: vertical;
    white-space: pre;
    overflow-x: auto;
    background: var(--input-bg);
    color: var(--text-main);
    line-height: 1.6;
  }
  #exportTextarea:focus { outline: none; border-color: var(--primary); }
  
  .modal-actions { display: flex; justify-content: flex-end; }
  .modal-actions .action-btn { flex: none; min-width: 140px; }

  /* Smooth dark mode transitions */
  body, .page-header, .card, .chart-wrapper, .modal-content,
  .input-group input, .saved-actions select, #exportTextarea,
  .popover, .action-btn { transition: background 0.25s, color 0.25s, border-color 0.25s; }

  /* Lagna Selector Modal */
  .lagna-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 10px 0;
  }
  .lagna-btn {
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 12px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lagna-btn:hover { background: var(--hover-bg); border-color: var(--primary); }
  .lagna-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* 3-dots Dropdown */
  .dots-dropdown {
    position: relative;
    display: inline-block;
  }
  .dots-btn {
    background: transparent;
    border: none;
    font-size: 1.4rem;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    line-height: 1;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .dots-btn:hover, .dots-btn:focus {
    background: var(--hover-bg);
    color: var(--text-main);
    outline: none;
  }
  .dots-content {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 4px);
    background-color: var(--popover-bg);
    min-width: 140px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 200;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    overflow: hidden;
  }
  .dots-content button {
    color: var(--red);
    padding: 12px 16px;
    text-decoration: none;
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .dots-content button:hover {
    background-color: var(--hover-bg);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .page-content { padding: 12px; gap: 14px; }
    .main-container { gap: 14px; flex-direction: column; }
    .chart-section { max-width: 100%; }
    .chart-wrapper { padding: 8px; }
    .card { padding: 14px; width: 100%; box-sizing: border-box; }

    .input-row { flex-direction: column; gap: 10px; }
    .input-group { min-width: 100%; flex: none; }

    .comp-text { font-size: clamp(0.62rem, 3.2vw, 0.9rem); }
    .center-input { font-size: clamp(0.7rem, 3.8vw, 1rem); }

    .global-actions {
      flex-direction: column;
      gap: 8px;
    }
    .global-actions .action-btn {
      max-width: none;
      width: 100%;
    }

    /* Saved Charts: keep dropdown + dots on one row */
    .saved-actions {
      flex-wrap: wrap;
      gap: 8px;
    }
    .saved-actions select {
      flex: 1 1 0;
      min-width: 0;
    }
    .saved-actions .action-btn {
      flex: none;
    }
    /* Compare dropdowns stack vertically on mobile */
    #compareChart1Dropdown,
    #compareChart2Dropdown {
      flex: 1 1 100% !important;
      width: 100%;
    }
    .saved-actions .ai-btn {
      flex: 1 1 100% !important;
      width: 100%;
    }

    .popover {
      grid-template-columns: repeat(3, 1fr);
      padding: 10px;
      gap: 5px;
    }
    .popover label { font-size: 0.9rem; padding: 4px 5px; }

    .modal-content { padding: 16px; width: 96%; }
    #exportTextarea { height: 240px; font-size: 12px; }

    .btn-group { flex-wrap: wrap; }
    .btn-group .action-btn { flex: 1; min-width: 80px; }

    /* AI prompt row — stack vertically */
    .input-row[style] { flex-direction: column; }
  }

  @media (max-width: 480px) {
    .page-header h1 { font-size: 1rem; }
    .page-header p { font-size: 0.7rem; }
    .card-title { font-size: 0.72rem; }
    .action-btn { font-size: 0.85rem; padding: 10px 12px; }
    .dots-btn { padding: 6px 10px; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div style="width:38px;"></div>
  <div class="page-header-center">
    <h1>ජාතක ලේඛනය</h1>
    <p>Sri Lankan Astrology Chart</p>
  </div>
  <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">☀️</button>
</header>

<div class="page-content">

<div class="main-container">
  
  <div class="card" style="width:100%;">
    <p class="card-title">Birth Details</p>
    <div class="input-row">
      <div class="input-group">
        <label>Gender</label>
        <select id="birthGender">
          <option value="Girl" selected>Girl</option>
          <option value="Boy">Boy</option>
        </select>
      </div>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="birthName" placeholder="e.g. Chamara">
      </div>
      <div class="input-group">
        <label>Date of Birth</label>
        <input type="text" id="birthDate" placeholder="e.g. 1990-01-01">
      </div>
      <div class="input-group" style="position: relative;">
        <label>Time of Birth</label>
        <input type="text" id="birthTime" placeholder="e.g. 10:30 AM" autocomplete="off">
        <div id="ampm-popup" style="display:none; position:absolute; top:calc(100% + 4px); left:0; background:var(--card-bg); border:1px solid var(--primary); border-radius:8px; padding:6px; z-index:100; box-shadow:var(--card-shadow); gap:6px;">
          <button type="button" class="action-btn" style="flex:1; padding:6px 12px; border-radius:6px; font-size:0.85rem;" onclick="setAmPm('AM')">AM</button>
          <button type="button" class="action-btn" style="flex:1; padding:6px 12px; border-radius:6px; font-size:0.85rem;" onclick="setAmPm('PM')">PM</button>
        </div>
      </div>
      <div class="input-group">
        <label>Timezone</label>
        <select id="birthTimezone">
          <option value="UTC+5.30">UTC+5:30</option>
          <option value="UTC+6.00">UTC+6:00</option>
        </select>
      </div>
      <div class="input-group">
        <label>Place of Birth</label>
        <input type="text" id="birthPlace" placeholder="e.g. Colombo, Sri Lanka">
      </div>
      <div class="input-group">
        <label>Label</label>
        <select id="chartLabel">
          <option value="🟢">🟢 Green</option>
          <option value="🟡">🟡 Yellow</option>
          <option value="🔴">🔴 Red</option>
        </select>
      </div>
    </div>
  </div>

  <!-- RASI CHART -->
  <div class="chart-section" id="rasi-section">
    <span class="chart-label">ලග්න කේන්ද්‍රය · Rasi Chart</span>
    <div class="chart-wrapper">
      <div class="chart" id="rasi-chart">
        <div class="cell">
          <svg class="bg-line" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" vector-effect="non-scaling-stroke" /></svg>
          <div class="compartment tri-comp tl-top" id="rasi-1"><div class="comp-text"></div></div>

<script>
  // ── Dark Mode ──────────────────────────────────────────────────────────────
  const html = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');

  function applyTheme(dark) {
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    toggleBtn.textContent = dark ? '🌙' : '☀️';
  }

  function toggleTheme() {
    const isDark = html.getAttribute('data-theme') === 'dark';
    const next = !isDark;
    localStorage.setItem('kendra-theme', next ? 'dark' : 'light');
    applyTheme(next);
  }

  toggleBtn.addEventListener('click', toggleTheme);

  // Initialise from saved preference or system setting
  const saved = localStorage.getItem('kendra-theme');
  if (saved) {
    applyTheme(saved === 'dark');
  } else {
    applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
  }
  // ──────────────────────────────────────────────────────────────────────────
  
  // ──────────────────────────────────────────────────────────────────────────

  const planets = [
    'ර', 'ච', 'කු', 'බු', 'ගු', 'ශු', 'ශ', 'රා', 'කේ', 'ල',
    '(කු)', '(බු)', '(ගු)', '(ශු)', '(ශ)',
    'යු', 'නෙ', 'ප්ලූ', '(යු)', '(නෙ)', '(ප්ලූ)'
  ];
  const signNames = {
    1: 'මේෂ (Aries)', 2: 'වෘෂභ (Taurus)', 3: 'මිථුන (Gemini)', 4: 'කටක (Cancer)',
    5: 'සිංහ (Leo)', 6: 'කන්‍යා (Virgo)', 7: 'තුලා (Libra)', 8: 'වෘශ්චික (Scorpio)',
    9: 'ධනු (Sagittarius)', 10: 'මකර (Capricorn)', 11: 'කුම්භ (Aquarius)', 12: 'මීන (Pisces)'
  };
  
  const popover = document.getElementById('popover');
  const state = {}; 
  let activeCompartment = null;

  planets.forEach(p => {
    const label = document.createElement('label');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.value = p;
    
    checkbox.addEventListener('change', (e) => {
      if (!activeCompartment) return;
      const compId = activeCompartment.id;
      if (!state[compId]) state[compId] = [];
      
      if (e.target.checked) {
        state[compId].push(p);
        label.classList.add('active-chip');
      } else {
        state[compId] = state[compId].filter(val => val !== p);
        label.classList.remove('active-chip');
      }
      updateCompartmentText(activeCompartment);
    });

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(p));
    popover.appendChild(label);
  });

  function updateCompartmentText(comp) {
    const textDiv = comp.querySelector('.comp-text');
    const selected = state[comp.id] || [];
    const orderedSelected = planets.filter(p => selected.includes(p));
    
    textDiv.innerHTML = '';
    orderedSelected.forEach(p => {
      const span = document.createElement('span');
      span.className = 'planet-pill';
      span.textContent = p;
      textDiv.appendChild(span);
    });
  }

  function closePopover() {
    popover.classList.remove('active');
    popover.style.visibility = 'hidden';
    if (activeCompartment) {
      activeCompartment.classList.remove('active');
      activeCompartment = null;
    }
  }

  document.querySelectorAll('.compartment').forEach(comp => {
    comp.addEventListener('click', (e) => {
      e.stopPropagation();
      if (activeCompartment === comp) { closePopover(); return; }
      if (activeCompartment) { activeCompartment.classList.remove('active'); }

      activeCompartment = comp;
      activeCompartment.classList.add('active');

      const selected = state[comp.id] || [];
      popover.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        const isChecked = selected.includes(cb.value);
        cb.checked = isChecked;
        if (isChecked) {
          cb.parentElement.classList.add('active-chip');
        } else {
          cb.parentElement.classList.remove('active-chip');
        }
      });

      popover.style.visibility = 'hidden';
      popover.classList.add('active');
      
      const popRect = popover.getBoundingClientRect();
      const offset = 18; 
      
      let leftPos = e.pageX + offset;
      let topPos = e.pageY + offset;

      if (leftPos + popRect.width > window.innerWidth) { leftPos = e.pageX - popRect.width - offset; }
      if (topPos + popRect.height > window.innerHeight) { topPos = e.pageY - popRect.height - offset; }
      
      leftPos = Math.max(15, leftPos);
      topPos = Math.max(15, topPos);

      popover.style.left = `${leftPos}px`;
      popover.style.top = `${topPos}px`;
      popover.style.visibility = 'visible';
    });
  });

  document.addEventListener('click', (e) => {
    if (activeCompartment && !popover.contains(e.target)) {
      closePopover();
    }
  });
  window.addEventListener('resize', closePopover);

  // Auto-format Birth Date (YYYY-MM-DD)
  document.getElementById('birthDate').addEventListener('input', function(e) {
    if (e.inputType === 'deleteContentBackward') return;
    let digits = e.target.value.replace(/\D/g, '').substring(0, 8);
    let out = '';
    
    if (digits.length >= 4) {
      out = digits.substring(0, 4) + '-';
      if (digits.length >= 6) {
        out += digits.substring(4, 6) + '-' + digits.substring(6);
      } else {
        out += digits.substring(4);
      }
    } else {
      out = digits;
    }
    
    e.target.value = out;
  });

  // Auto-format Birth Time (HH:MM AM/PM)
  document.getElementById('birthTime').addEventListener('input', function(e) {
    if (e.inputType === 'deleteContentBackward') return;
    let v = e.target.value;
    let digits = v.replace(/\D/g, '').substring(0, 4);
    
    // Auto-pad hours if user types 2-9 as first digit
    if (digits.length === 1 && parseInt(digits[0]) > 1) {
      digits = '0' + digits;
    }
    
    let out = '';
    if (digits.length >= 2) {
      out = digits.substring(0, 2) + ':';
      if (digits.length > 2) {
        out += digits.substring(2);
      }
    } else {
      out = digits;
    }
    
    if (digits.length === 4) {
      let letters = v.replace(/[^AaPp]/g, '').toUpperCase();
      if (letters.includes('A')) {
        out += ' AM';
        document.getElementById('ampm-popup').style.display = 'none';
      } else if (letters.includes('P')) {
        out += ' PM';
        document.getElementById('ampm-popup').style.display = 'none';
      } else {
        if (!out.endsWith(' ')) out += ' ';
        document.getElementById('ampm-popup').style.display = 'flex';
      }
    } else {
      document.getElementById('ampm-popup').style.display = 'none';
    }
    
    e.target.value = out;
  });

  function setAmPm(val) {
    let input = document.getElementById('birthTime');
    let v = input.value.trim();
    if (v.endsWith('AM') || v.endsWith('PM')) {
      v = v.substring(0, v.length - 2).trim();
    }
    input.value = v + ' ' + val;
    document.getElementById('ampm-popup').style.display = 'none';
    input.focus();
  }

  // Close popup if clicked outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#birthTime') && !e.target.closest('#ampm-popup')) {
      const popup = document.getElementById('ampm-popup');
      if (popup) popup.style.display = 'none';
    }
  });

  const selectedLagna = { rasi: null, navamsa: null };

  function openLagnaModal(type) {
    document.getElementById('lagnaModalTitle').textContent = type === 'rasi' ? 'ලග්නය තෝරන්න' : 'නවාංශකය තෝරන්න';
    const grid = document.getElementById('lagnaGrid');
    grid.innerHTML = '';
    
    for (let i = 1; i <= 12; i++) {
      const btn = document.createElement('button');
      btn.className = 'lagna-btn';
      if (selectedLagna[type] == i) btn.classList.add('selected');
      btn.textContent = signNames[i].split(' ')[0];
      btn.onclick = () => {
        selectedLagna[type] = i;
        document.getElementById(`${type}-lagna-selector`).textContent = signNames[i].split(' ')[0] + (type === 'rasi' ? ' ලග්නය' : ' නවාංශකය');
        closeLagnaModal();
      };
      grid.appendChild(btn);
    }
    
    document.getElementById('lagnaModalOverlay').classList.add('active');
  }

  function closeLagnaModal(e) {
    if (e && e.target !== document.getElementById('lagnaModalOverlay')) return;
    document.getElementById('lagnaModalOverlay').classList.remove('active');
  }

  // Reset Logic
  function resetChart(type) {
    for(let i=1; i<=12; i++) {
      state[`${type}-${i}`] = [];
      const textDiv = document.querySelector(`#${type}-${i} .comp-text`);
      if(textDiv) textDiv.textContent = '';
    }
    selectedLagna[type] = null;
    const selector = document.getElementById(`${type}-lagna-selector`);
    if (selector) selector.textContent = type === 'rasi' ? 'ලග්නය' : 'නවාංශකය';
    
    if (activeCompartment && activeCompartment.id.startsWith(type)) {
      closePopover();
    }
  }

  function resetAll() {
    resetChart('rasi');
    resetChart('navamsa');
    document.getElementById('birthName').value = '';
    document.getElementById('birthDate').value = '';
    document.getElementById('birthTime').value = '';
    document.getElementById('birthTimezone').value = 'UTC+5.30';
    document.getElementById('birthPlace').value = '';
    document.getElementById('chartLabel').value = '🟢';
    document.getElementById('birthGender').value = 'Girl';
  }

  // API Integration for Save/Load
  const API_URL = '/api/charts';

  async function fetchSavedCharts() {
    try {
      const res = await fetch(API_URL);
      let charts = await res.json();
      
      const labelOrder = { '🟢': 1, '🟡': 2, '🔴': 3 };
      charts.sort((a, b) => {
        const valA = labelOrder[a.label || '🟢'] || 4;
        const valB = labelOrder[b.label || '🟢'] || 4;
        return valA - valB;
      });

      const dropdown = document.getElementById('savedChartsDropdown');
      const comp1 = document.getElementById('compareChart1Dropdown');
      const comp2 = document.getElementById('compareChart2Dropdown');
      
      dropdown.innerHTML = '<option value="" disabled selected>Select a saved chart...</option>';
      if(comp1) comp1.innerHTML = '<option value="" disabled selected>Select Girl (Person 1)...</option>';
      if(comp2) comp2.innerHTML = '<option value="" disabled selected>Select Boy (Person 2)...</option>';
      
      let girlCount = 0;
      let boyCount = 0;
      let lastGirlId = null;
      let lastBoyId = null;

      charts.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        const label = c.label || "🟢";
        opt.textContent = `${label} ${c.id}`;
        dropdown.appendChild(opt.cloneNode(true));
        const gender = c.gender || 'Girl'; // Default legacy charts to Girl
        
        if (gender === 'Girl') {
          if(comp1) comp1.appendChild(opt.cloneNode(true));
          girlCount++;
          lastGirlId = c.id;
        } else if (gender === 'Boy') {
          if(comp2) comp2.appendChild(opt.cloneNode(true));
          boyCount++;
          lastBoyId = c.id;
        }
      });

      if (comp1 && girlCount === 1) {
        comp1.value = lastGirlId;
      }
      if (comp2 && boyCount === 1) {
        comp2.value = lastBoyId;
      }

      window.savedChartsData = charts;
    } catch (err) {
      console.error('Failed to fetch charts', err);
    }
  }

  // Fetch charts when page loads
  fetchSavedCharts();

  async function saveChart() {
    const name = document.getElementById('birthName').value.trim();
    const date = document.getElementById('birthDate').value.trim();
    const time = document.getElementById('birthTime').value.trim();
    
    if (!name || !date) {
      alert("Please enter both Name and Date of Birth to save a chart.");
      return;
    }
    
    const timeUpper = time.toUpperCase();
    if (!timeUpper.includes('AM') && !timeUpper.includes('PM')) {
      alert("Please include AM or PM in the Birth Time (e.g. 10:30 AM).");
      return;
    }

    if (!selectedLagna.rasi) {
      alert("Please select a Lagna for the Rasi chart.");
      return;
    }

    let navamsaHasData = false;
    for (let i = 1; i <= 12; i++) {
      if (state[`navamsa-${i}`] && state[`navamsa-${i}`].length > 0) {
        navamsaHasData = true;
        break;
      }
    }

    if (navamsaHasData && !selectedLagna.navamsa) {
      alert("Please select a Lagna for the Navamsa chart since it contains data.");
      return;
    }

    const year = date.split('-')[0] || date;
    const id = `${year} - ${name}`;

    const chartData = {
      id,
      name,
      date,
      time: time,
      timezone: document.getElementById('birthTimezone').value,
      place: document.getElementById('birthPlace').value,
      label: document.getElementById('chartLabel').value,
      gender: document.getElementById('birthGender').value,
      rasiLagna: selectedLagna.rasi,
      navamsaLagna: selectedLagna.navamsa,
      state: state
    };

    if (!confirm(`Are you sure you want to save the chart for "${id}"? This will overwrite any existing chart with the same name and year.`)) {
      return;
    }

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(chartData)
      });
      if (res.ok) {
        alert(`Chart for "${id}" saved successfully!`);
        fetchSavedCharts();
      } else {
        alert("Failed to save chart.");
      }
    } catch (err) {
      alert("Error saving chart. Is the server running?");
      console.error(err);
    }
  }

  function loadChart() {
    const dropdown = document.getElementById('savedChartsDropdown');
    const id = dropdown.value;
    if (!id || !window.savedChartsData) return;

    const chartData = window.savedChartsData.find(c => c.id === id);
    if (!chartData) return;

    resetAll();

    document.getElementById('birthName').value = chartData.name || '';
    document.getElementById('birthDate').value = chartData.date || '';
    document.getElementById('birthTime').value = chartData.time || '';
    document.getElementById('birthTimezone').value = chartData.timezone || 'UTC+5.30';
    document.getElementById('birthPlace').value = chartData.place || '';
    document.getElementById('chartLabel').value = chartData.label || '🟢';
    document.getElementById('birthGender').value = chartData.gender || 'Girl';

    const rasiSelector = document.getElementById('rasi-lagna-selector');
    if (rasiSelector && chartData.rasiLagna) {
      selectedLagna.rasi = chartData.rasiLagna;
      rasiSelector.textContent = signNames[chartData.rasiLagna].split(' ')[0] + ' ලග්නය';
    }
    
    const navamsaSelector = document.getElementById('navamsa-lagna-selector');
    if (navamsaSelector && chartData.navamsaLagna) {
      selectedLagna.navamsa = chartData.navamsaLagna;
      navamsaSelector.textContent = signNames[chartData.navamsaLagna].split(' ')[0] + ' නවාංශකය';
    }

    if (chartData.state) {
      Object.keys(chartData.state).forEach(key => {
        state[key] = chartData.state[key];
        const comp = document.getElementById(key);
        if (comp) updateCompartmentText(comp);
      });
    }
  }

  async function deleteChart() {
    const dropdown = document.getElementById('savedChartsDropdown');
    const id = dropdown.value;
    if (!id) return;

    if (!confirm(`Are you sure you want to delete the chart for "${id}"?`)) return;

    try {
      const res = await fetch(`${API_URL}/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (res.ok) {
        alert('Chart deleted.');
        fetchSavedCharts();
      }
    } catch (err) {
      alert("Error deleting chart.");
      console.error(err);
    }
  }

  // Export Logic
  function padStr(str, len = 12) {
    if (!str) return ' '.repeat(len);
    let diff = len - str.length;
    if (diff <= 0) return str.substring(0, len);
    let left = Math.floor(diff / 2);
    let right = diff - left;
    return ' '.repeat(left) + str + ' '.repeat(right);
  }

  function generateAscii(type) {
    const s = {};
    for(let i = 1; i <= 12; i++) {
      const val = state[`${type}-${i}`];
      s[i] = val && val.length > 0 ? val.join(',') : '';
    }
    const titleSelector = document.getElementById(`${type}-lagna-selector`);
    let titleText = 'Unknown';
    if (titleSelector && titleSelector.textContent !== 'ලග්නය' && titleSelector.textContent !== 'නවාංශකය') {
      titleText = titleSelector.textContent;
    }
    const t = padStr(titleText, 26);

    return `+------------+------------+------------+------------+
|            |            |            |            |
|${padStr(s[12])}|${padStr(s[1])}|${padStr(s[2])}|${padStr(s[3])}|
|            |            |            |            |
+------------+------------+------------+------------+
|            |                         |            |
|${padStr(s[11])}|                         |${padStr(s[4])}|
|            |                         |            |
+------------+${t}+------------+
|            |                         |            |
|${padStr(s[10])}|                         |${padStr(s[5])}|
|            |                         |            |
+------------+------------+------------+------------+
|            |            |            |            |
|${padStr(s[9])}|${padStr(s[8])}|${padStr(s[7])}|${padStr(s[6])}|
|            |            |            |            |
+------------+------------+------------+------------+`;
  }

  function getOrdinal(n) {
    const s = ["th", "st", "nd", "rd"];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function getChartPromptData(type) {
    let lagnaIdx = selectedLagna[type] ? parseInt(selectedLagna[type]) : 1;
    let titleText = 'Unknown';
    if (selectedLagna[type]) {
      titleText = signNames[selectedLagna[type]].split(' ')[0] + (type === 'rasi' ? ' ලග්නය' : ' නවාංශකය');
    } else {
       const titleSelector = document.getElementById(`${type}-lagna-selector`);
       if (titleSelector && titleSelector.textContent !== 'ලග්නය' && titleSelector.textContent !== 'නවාංශකය') {
         titleText = titleSelector.textContent;
       }
    }

    let data = `**Ascendant (Lagna):** ${titleText}\n\n`;
    data += `**Planetary Positions by House (Bhava):**\n`;
    
    // Print all 12 houses starting from Lagna
    // In Sri Lankan North Indian charts, the houses are FIXED to the UI compartments.
    // 1st House = Top-Middle (rasi-2), and it proceeds anti-clockwise.
    const houseToComp = [0, 2, 1, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3];
    
    for(let h = 1; h <= 12; h++) {
      // The zodiac sign for the house progresses clockwise from the Lagna sign
      let signIdx = ((lagnaIdx + h - 2) % 12) + 1;
      
      // The UI compartment for the house is fixed
      let compIdx = houseToComp[h];
      
      const val = state[`${type}-${compIdx}`];
      const planetsStr = val && val.length > 0 ? val.join(', ') : '[Empty]';
      data += `- ${getOrdinal(h)} House (${signNames[signIdx]}): ${planetsStr}\n`;
    }
    return data;
  }

  function isChartEmpty(type) {
    for (let i = 1; i <= 12; i++) {
      if (state[`${type}-${i}`] && state[`${type}-${i}`].length > 0) {
        return false;
      }
    }
    return true;
  }

  function generateAIPromptFromData(chartData) {
    const { name, date, time, timezone, place, rasiLagna, navamsaLagna, state: cState, gender } = chartData;
    let header = `**Birth Details for ${name || 'Unknown'}:**\n`;
    if (gender) header += `- Gender: ${gender}\n`;
    if (date) header += `- Date: ${date}\n`;
    if (time) header += `- Time: ${time} ${timezone ? '(' + timezone + ')' : ''}\n`;
    if (place) header += `- Place: ${place}\n`;
    header += `\n`;

    function getChartPromptDataLocal(t, lagna, st) {
      let titleText = lagna ? signNames[lagna].split(' ')[0] + (t === 'rasi' ? ' ලග්නය' : ' නවාංශකය') : 'Unknown';
      let lagnaIdx = parseInt(lagna) || 1;
      
      let data = `**Ascendant (Lagna):** ${titleText}\n\n`;
      data += `**Planetary Positions by House (Bhava):**\n`;
      const houseToComp = [0, 2, 1, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3];
      for(let h = 1; h <= 12; h++) {
        let signIdx = ((lagnaIdx + h - 2) % 12) + 1;
        let compIdx = houseToComp[h];
        const val = st[`${t}-${compIdx}`];
        const planetsStr = val && val.length > 0 ? val.join(', ') : '[Empty]';
        data += `- ${getOrdinal(h)} House (${signNames[signIdx]}): ${planetsStr}\n`;
      }
      return data;
    }

    function isChartEmptyLocal(t, st) {
      for (let i = 1; i <= 12; i++) {
        if (st[`${t}-${i}`] && st[`${t}-${i}`].length > 0) return false;
      }
      return true;
    }

    let prompt = header;
    prompt += `### 1. Rasi Chart (D1)\n` + getChartPromptDataLocal('rasi', rasiLagna, cState) + `\n\n`;
    
    if (!isChartEmptyLocal('navamsa', cState)) {
      prompt += `### 2. Navamsa Chart (D9)\n` + getChartPromptDataLocal('navamsa', navamsaLagna, cState);
    } else {
      prompt += `*(Navamsa Chart not provided)*\n`;
    }
    
    return prompt;
  }

  function openCompareExportModal() {
    const id1 = document.getElementById('compareChart1Dropdown').value;
    const id2 = document.getElementById('compareChart2Dropdown').value;
    
    if (!id1 || !id2) {
      alert("Please select two people to compare.");
      return;
    }
    if (id1 === id2) {
      alert("Please select two different people to compare.");
      return;
    }

    const chart1 = window.savedChartsData.find(c => c.id === id1);
    const chart2 = window.savedChartsData.find(c => c.id === id2);
    
    if (!chart1 || !chart2) return;

    let finalPrompt = `# Person 1 (Girl)\n\n` + generateAIPromptFromData(chart1) + `\n\n---\n\n`;
    finalPrompt += `# Person 2 (Boy)\n\n` + generateAIPromptFromData(chart2);

    if (document.getElementById('enableAiPrompt').checked) {
      const customPrompt = document.getElementById('aiCustomPrompt').value.trim();
      if (customPrompt) {
        finalPrompt += `\n\n### Custom Instructions\n${customPrompt}`;
      }
    }

    const modal = document.getElementById('exportModal');
    const textarea = document.getElementById('exportTextarea');
    const title = document.getElementById('modalTitle');
    
    title.textContent = `AI Prompt - Compare Charts`;
    textarea.value = finalPrompt;
    
    modal.classList.add('active');
  }

  function generateAIPrompt(type) {
    const bName = document.getElementById('birthName').value.trim();
    const bDate = document.getElementById('birthDate').value;
    const bTime = document.getElementById('birthTime').value;
    const bPlace = document.getElementById('birthPlace').value;
    const bGender = document.getElementById('birthGender').value;
    
    let header = ``;
    if (bName || bDate || bTime || bPlace || bGender) {
      if (bName) {
        header += `**Birth Details for ${bName}:**\n`;
      } else {
        header += `**Birth Details:**\n`;
      }
      if (bGender) header += `- Gender: ${bGender}\n`;
      if (bDate) header += `- Date: ${bDate}\n`;
      if (bTime) header += `- Time: ${bTime}\n`;
      if (bPlace) header += `- Place: ${bPlace}\n`;
      header += `\n`;
    }

    let finalPrompt = '';
    if (type === 'both') {
      let prompt = header + `### 1. Rasi Chart (D1)\n` + getChartPromptData('rasi') + `\n\n`;
      if (!isChartEmpty('navamsa')) {
        prompt += `### 2. Navamsa Chart (D9)\n` + getChartPromptData('navamsa');
      } else {
        prompt += `*(Navamsa Chart not provided)*\n`;
      }
      finalPrompt = prompt;
    } else {
      const chartName = type === 'rasi' ? 'Rasi (D1)' : 'Navamsa (D9)';
      finalPrompt = header + `**Chart Type:** ${chartName}\n` + getChartPromptData(type);
    }
    
    if (document.getElementById('enableAiPrompt').checked) {
      const customPrompt = document.getElementById('aiCustomPrompt').value.trim();
      if (customPrompt) {
        finalPrompt += `\n\n### Custom Instructions\n${customPrompt}`;
      }
    }
    return finalPrompt;
  }

  function openExportModal(type, format) {
    const modal = document.getElementById('exportModal');
    const textarea = document.getElementById('exportTextarea');
    const title = document.getElementById('modalTitle');
    
    if (format === 'ascii') {
      title.textContent = `ASCII Grid - ${type === 'rasi' ? 'Rasi' : 'Navamsa'}`;
      textarea.value = generateAscii(type);
    } else {
      if (type === 'both') {
        title.textContent = `AI Prompt - Rasi & Navamsa`;
      } else {
        title.textContent = `AI Prompt - ${type === 'rasi' ? 'Rasi' : 'Navamsa'}`;
      }
      textarea.value = generateAIPrompt(type);
    }
    
    modal.classList.add('active');
  }

  function closeModal() {
    document.getElementById('exportModal').classList.remove('active');
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = 'Copy to Clipboard';
    btn.style.background = '#222';
  }

  function handleModalClick(e) {
    if (e.target.id === 'exportModal') {
      closeModal();
    }
  }

  function copyFromTextarea() {
    const textarea = document.getElementById('exportTextarea');
    textarea.select();
    textarea.setSelectionRange(0, 99999);
    
    function onSuccess() {
      const btn = document.getElementById('modalCopyBtn');
      btn.textContent = 'Copied!';
      btn.style.background = '#4CAF50';
    }

    function fallbackCopy() {
      try {
        const successful = document.execCommand('copy');
        if (successful) onSuccess();
        else alert('Could not copy automatically. Please long-press and copy manually.');
      } catch (err) {
        console.error('Fallback copy failed', err);
        alert('Could not copy automatically. Please long-press and copy manually.');
      }
    }

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(textarea.value).then(onSuccess).catch(err => {
        console.warn('Clipboard API failed, trying fallback...', err);
        fallbackCopy();
      });
    } else {
      fallbackCopy();
    }
  }

  // AI Custom Prompt Logic
  let aiPrompts = [];
  
  window.addEventListener('DOMContentLoaded', async () => {
    const savedEnable = localStorage.getItem('enableAiPrompt');
    if (savedEnable !== null) {
      document.getElementById('enableAiPrompt').checked = savedEnable === 'true';
    }
    
    try {
      const res = await fetch('/api/prompts');
      aiPrompts = await res.json();
    } catch (err) {
      console.error('Failed to load custom prompts from server', err);
      aiPrompts = JSON.parse(localStorage.getItem('aiPromptsList') || '[]');
    }

    // Migration for old single prompt
    const oldPrompt = localStorage.getItem('aiCustomPrompt');
    if (oldPrompt && aiPrompts.length === 0) {
      aiPrompts.push({ id: Date.now().toString(), name: 'Default Prompt', text: oldPrompt });
      localStorage.removeItem('aiCustomPrompt');
      savePromptsList();
    }
    
    renderAiPromptsDropdown();
    
    // Select last active prompt
    const lastActive = localStorage.getItem('activeAiPromptId');
    if (lastActive && aiPrompts.find(p => p.id === lastActive)) {
      document.getElementById('aiPromptSelect').value = lastActive;
      loadSelectedAiPrompt();
    } else if (aiPrompts.length > 0) {
      document.getElementById('aiPromptSelect').value = aiPrompts[0].id;
      loadSelectedAiPrompt();
    }
  });

  async function savePromptsList() {
    localStorage.setItem('aiPromptsList', JSON.stringify(aiPrompts));
    try {
      await fetch('/api/prompts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(aiPrompts)
      });
    } catch (err) {
      console.error('Failed to sync custom prompts to server', err);
    }
  }

  function saveAiPromptSettings() {
    const enable = document.getElementById('enableAiPrompt').checked;
    localStorage.setItem('enableAiPrompt', enable);
  }

  function renderAiPromptsDropdown() {
    const select = document.getElementById('aiPromptSelect');
    select.innerHTML = '<option value="new">+ Create New Prompt</option>';
    aiPrompts.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      select.appendChild(opt);
    });
  }

  function loadSelectedAiPrompt() {
    const val = document.getElementById('aiPromptSelect').value;
    const delBtn = document.getElementById('aiPromptDotsContainer');
    
    if (val === 'new') {
      document.getElementById('aiPromptName').value = '';
      document.getElementById('aiCustomPrompt').value = '';
      delBtn.style.display = 'none';
      localStorage.removeItem('activeAiPromptId');
    } else {
      const p = aiPrompts.find(x => x.id === val);
      if (p) {
        document.getElementById('aiPromptName').value = p.name;
        document.getElementById('aiCustomPrompt').value = p.text;
        delBtn.style.display = 'block';
        localStorage.setItem('activeAiPromptId', p.id);
      }
    }
  }

  function saveAiPrompt() {
    saveAiPromptSettings();
    const name = document.getElementById('aiPromptName').value.trim();
    const text = document.getElementById('aiCustomPrompt').value.trim();
    const select = document.getElementById('aiPromptSelect');
    
    if (!name) {
      alert("Please enter a Prompt Name.");
      return;
    }
    
    if (select.value === 'new') {
      const newId = Date.now().toString();
      aiPrompts.push({ id: newId, name, text });
      savePromptsList();
      renderAiPromptsDropdown();
      select.value = newId;
      loadSelectedAiPrompt();
      alert('New AI Prompt created!');
    } else {
      const p = aiPrompts.find(x => x.id === select.value);
      if (p) {
        p.name = name;
        p.text = text;
        savePromptsList();
        renderAiPromptsDropdown();
        select.value = p.id; // Keep selected
        alert('AI Prompt updated!');
      }
    }
  }

  function deleteAiPrompt() {
    const select = document.getElementById('aiPromptSelect');
    if (select.value === 'new') return;
    
    if (confirm("Are you sure you want to delete this prompt?")) {
      aiPrompts = aiPrompts.filter(x => x.id !== select.value);
      savePromptsList();
      renderAiPromptsDropdown();
      select.value = 'new';
      loadSelectedAiPrompt();
      alert('Prompt deleted.');
    }
  }

  // Handle 3-dots dropdown toggling
  function toggleDots(btn) {
    const content = btn.nextElementSibling;
    const isVisible = content.style.display === 'block';
    
    // Hide all open dots
    document.querySelectorAll('.dots-content').forEach(c => c.style.display = 'none');
    
    if (!isVisible) {
      content.style.display = 'block';
    }
    
    // Prevent event from bubbling up to the document click listener
    if (event) event.stopPropagation();
  }

  // Close dropdowns when clicking outside
  document.addEventListener('click', () => {
    document.querySelectorAll('.dots-content').forEach(c => c.style.display = 'none');
  });

</script>
